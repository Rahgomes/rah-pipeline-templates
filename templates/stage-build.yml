parameters:
  - name: appName
    type: string
  - name: imageName
    type: string
  - name: registryUrl
    type: string
    default: "registry.ramongomessilva.com.br"
  - name: envLabel
    type: string
    default: ""
  # Args a serem passados pro `docker build` como `--build-arg K=V ...`.
  # Usado quando a imagem precisa de NEXT_PUBLIC_* bakeado no bundle, ou
  # de tokens pra upload de source maps (Sentry etc). String única,
  # pre-expandida pelo caller — ex.: `--build-arg FOO=$(FOO_VAR)`.
  - name: buildArgs
    type: string
    default: ""

stages:
  - stage: Build
    displayName: "Build Docker Image"
    jobs:
      - job: BuildJob
        displayName: "Build"
        timeoutInMinutes: 20
        steps:
          - checkout: self
            displayName: "Checkout source code"

          - template: notify-start.yml
            parameters:
              appName: ${{ parameters.appName }}
              envLabel: ${{ parameters.envLabel }}

          - template: build-docker.yml
            parameters:
              imageName: ${{ parameters.imageName }}
              registryUrl: ${{ parameters.registryUrl }}
              buildArgs: ${{ parameters.buildArgs }}
