parameters:
  - name: imageName
    type: string
  - name: registryUrl
    type: string
    default: "registry.ramongomessilva.com.br"
  # Args repassados como `--build-arg K=V ...`. Já vem pré-expandido pelo
  # caller (ex: `--build-arg FOO=$(FOO_VAR)`), então usamos direto na linha
  # do docker build sem escape/quote extra.
  - name: buildArgs
    type: string
    default: ""

steps:
  - script: |
      set -euo pipefail
      REGISTRY="${{ parameters.registryUrl }}"
      IMAGE="${{ parameters.imageName }}"
      TAG="$(Build.BuildId)"

      echo "Building Docker image: $IMAGE..."
      docker build ${{ parameters.buildArgs }} -t $IMAGE:$TAG -t $IMAGE:latest .

      echo "Tagging for registry: $REGISTRY/$IMAGE..."
      docker tag $IMAGE:$TAG $REGISTRY/$IMAGE:$TAG
      docker tag $IMAGE:latest $REGISTRY/$IMAGE:latest

      echo "Pushing to registry..."
      docker push $REGISTRY/$IMAGE:$TAG
      docker push $REGISTRY/$IMAGE:latest

      echo "Build and push completed successfully"
      # Lista as últimas tags pra debug. `| head -5` combinado com `set -o
      # pipefail` matava o step com SIGPIPE (exit 141) mesmo com o build OK —
      # o `|| true` isola o exit code dessa linha do resto do job.
      docker images $IMAGE --format "table {{.Tag}}\t{{.Size}}\t{{.CreatedAt}}" | head -5 || true
    displayName: "Build and push Docker image"
