parameters:
  - name: imageName
    type: string

steps:
  - script: |
      set -euo pipefail
      echo "Building Docker image: ${{ parameters.imageName }}..."
      docker build -t ${{ parameters.imageName }}:$(Build.BuildId) -t ${{ parameters.imageName }}:latest .
      echo "Build completed successfully"
      docker images ${{ parameters.imageName }} --format "table {{.Tag}}\t{{.Size}}\t{{.CreatedAt}}" | head -5
    displayName: "Build Docker image"
